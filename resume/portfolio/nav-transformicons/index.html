<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navicon Transformicons</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="../../../site-effects.js" defer></script>
  <script src="js/index.js" defer></script>
</head>
<body>
  <main class="demo-shell">
    <section class="device" aria-labelledby="demo-title">
      <nav class="icon-bar" aria-label="Transformicon examples">
        <button class="navicon-button larr" type="button" aria-label="Toggle left arrow" aria-pressed="false">
          <span class="navicon"></span>
        </button>
        <button class="navicon-button rarr" type="button" aria-label="Toggle right arrow" aria-pressed="false">
          <span class="navicon"></span>
        </button>
        <button class="navicon-button uarr" type="button" aria-label="Toggle up arrow" aria-pressed="false">
          <span class="navicon"></span>
        </button>
        <button class="navicon-button x" type="button" aria-label="Toggle close icon" aria-pressed="false">
          <span class="navicon"></span>
        </button>
        <button class="navicon-button plus" type="button" aria-label="Toggle plus icon" aria-pressed="false">
          <span class="navicon"></span>
        </button>
        <button class="navicon-button minus" type="button" aria-label="Toggle minus icon" aria-pressed="false">
          <span class="navicon"></span>
        </button>
      </nav>

      <div class="stage">
        <p class="eyebrow">Transformicons</p>
        <h1 id="demo-title">Click the icons.</h1>
        <p class="hint">Each menu button morphs into a different navigation state.</p>
      </div>
    </section>
  </main>
</body>
</html>
