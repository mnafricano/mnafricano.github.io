name: Revenue Auditor CI

on:
  pull_request:
    paths:
      - "apps/revenue-auditor/**"
      - "supabase/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mnafricano/revenue-auditor check
      - run: pnpm audit --audit-level high
      - run: pnpm --filter @mnafricano/revenue-auditor build
      - run: pnpm --filter @mnafricano/revenue-auditor exec playwright install --with-deps chromium
      - run: pnpm --filter @mnafricano/revenue-auditor test:e2e

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      - run: supabase test db
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check supabase
      - run: deno lint --config supabase/deno.json supabase/functions
      - run: deno test --allow-env supabase/functions/tests

  existing-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
