name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["Revenue Auditor CI"]
    types: [completed]
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Revenue Leak Auditor
        run: pnpm --filter @mnafricano/revenue-auditor build
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_URL: https://mnafricano.github.io/revenue-auditor/
          VITE_SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          VITE_AUTH_FROM_EMAIL: ${{ vars.AUTH_FROM_EMAIL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          VITE_GOOGLE_AUTH_ENABLED: "true"
          VITE_EMAIL_AUTH_ENABLED: ${{ vars.EMAIL_AUTH_ENABLED || 'false' }}
      - name: Assemble static site
        run: |
          mkdir _site
          rsync -a ./ _site/ \
            --exclude .git \
            --exclude .github \
            --exclude _site \
            --exclude apps \
            --exclude supabase \
            --exclude node_modules \
            --exclude tests \
            --exclude cognitive_multiplexer \
            --exclude pyproject.toml \
            --exclude package.json \
            --exclude pnpm-lock.yaml \
            --exclude pnpm-workspace.yaml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
